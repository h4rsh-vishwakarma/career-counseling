<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Mentor dashboard — create and manage mentorship sessions on Career Counseling Platform.">
    <title>Mentor Dashboard - Career Counseling</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/mentorship.css">
</head>
<body>
    <header>
        <h1>Career Counseling</h1>
        <nav>
            <ul>
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="mentorship-mentor.html">Mentorship</a></li>
                <li><a href="jobs.html">Jobs</a></li>
                <li><a href="youtube.html">Videos</a></li>
                <li><a href="chat.html">Chat</a></li>
                <li><a href="#" onclick="logout(); return false;">Logout</a></li>
            </ul>
        </nav>
        <button id="hamburger" aria-label="Toggle navigation" aria-expanded="false">
            <span></span><span></span><span></span>
        </button>
    </header>

    <div class="page-wrapper">
        <h1 class="section-title">Mentor Dashboard</h1>
        <p class="section-sub">Create sessions and manage student requests.</p>

        <section class="create-session">
            <h3>Create a New Session</h3>
            <form id="create-session-form">
                <div class="form-group">
                    <label for="title">Session Title</label>
                    <input type="text" id="title" required aria-label="Session title" placeholder="e.g. Resume Review Workshop">
                </div>
                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" rows="3" required aria-label="Session description" placeholder="What will students learn?"></textarea>
                </div>
                <div class="form-group">
                    <label for="session_date">Date</label>
                    <input type="date" id="session_date" required>
                </div>
                <div class="form-group">
                    <label for="session_time">Time</label>
                    <input type="time" id="session_time" required>
                </div>
                <div class="form-group">
                    <label for="mode">Mode</label>
                    <select id="mode" required>
                        <option value="Online">Online</option>
                        <option value="Offline">Offline</option>
                    </select>
                </div>
                <button type="submit" class="btn">Create Session</button>
            </form>
        </section>

        <section class="mentor-requests">
            <h3>Mentorship Requests</h3>
            <div id="mentor-requests-container" aria-live="polite">
                <div class="spinner"></div>
            </div>
        </section>

        <section class="mentor-sessions">
            <h2>Your Sessions</h2>
            <div id="sessions-container" aria-live="polite">
                <div class="spinner"></div>
            </div>
        </section>
    </div>

    <footer>
        <p>&copy; 2025 Career Counseling. All rights reserved.</p>
    </footer>

    <script src="js/logout.js"></script>
    <script src="js/nav.js" defer></script>
    <script src="js/mentorship-mentor.js" defer></script>
</body>
</html>
