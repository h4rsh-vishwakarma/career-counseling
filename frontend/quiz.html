<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Test your knowledge with career and mentorship quizzes on the Career Counseling Platform.">
    <title>Quizzes - Career Counseling</title>
    <link rel="stylesheet" href="css/quiz.css">
</head>
<body>
    <header>
        <h1>Quiz Section</h1>
        <nav>
            <ul>
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a id="mentorshipLink" href="mentorship-student.html">Mentorship</a></li>
                <li><a href="jobs.html">Jobs</a></li>
                <li><a href="#" onclick="logout()">Logout</a></li>
            </ul>
        </nav>
    </header>

    <section class="quiz-section">
        <h2>Available Quizzes</h2>
        <label for="quiz-category">Select Quiz Type:</label>
        <select id="quiz-category">
            <option value="mentorship">Mentorship Quizzes</option>
            <option value="career">Career-Based Quizzes</option>
        </select>
        <button onclick="loadQuiz()">Start Quiz</button>
    </section>

    <section id="quiz-container" style="display:none;">
        <h3 id="quiz-title"></h3>
        <div id="quiz-questions"></div>
        <button onclick="submitQuiz()">Submit Quiz</button>
        <p id="score-message" style="display:none; color: green; font-weight: bold;" aria-live="polite"></p>
    </section>

    <footer>
        <p>&copy; 2025 Career Counseling. All rights reserved.</p>
    </footer>

    <script src="js/logout.js"></script>
    <script src="js/nav.js"></script>
    <script>
        // Stores correct answers keyed by question index
        const correctAnswers = {};

        async function loadQuiz() {
            const category = document.getElementById("quiz-category").value;
            document.getElementById("quiz-container").style.display = "block";
            document.getElementById("quiz-questions").innerHTML = "Loading questions...";

            const apiUrl = category === "mentorship"
                ? "https://opentdb.com/api.php?amount=5&category=9&type=multiple"
                : "https://opentdb.com/api.php?amount=5&category=17&type=multiple";

            try {
                const response = await fetch(apiUrl);
                const data = await response.json();
                displayQuestions(data.results);
            } catch (error) {
                document.getElementById("quiz-questions").innerHTML = "Failed to load questions. Try again later.";
            }
        }

        function decodeHtml(html) {
            return new DOMParser().parseFromString(html, "text/html").body.textContent;
        }

        function displayQuestions(questions) {
            const quizContainer = document.getElementById("quiz-questions");
            quizContainer.innerHTML = "";
            Object.keys(correctAnswers).forEach(k => delete correctAnswers[k]);

            questions.forEach((q, index) => {
                correctAnswers[index] = decodeHtml(q.correct_answer);

                const div = document.createElement("div");
                div.classList.add("question-box");

                const questionText = document.createElement("p");
                questionText.className = "question-text";
                questionText.textContent = `${index + 1}. ${decodeHtml(q.question)}`;
                div.appendChild(questionText);

                const options = [...q.incorrect_answers.map(decodeHtml), decodeHtml(q.correct_answer)]
                    .sort(() => Math.random() - 0.5);

                options.forEach(option => {
                    const label = document.createElement("label");
                    label.className = "option-label";
                    const input = document.createElement("input");
                    input.type = "radio";
                    input.name = `q${index}`;
                    input.value = option;
                    const span = document.createElement("span");
                    span.className = "option-text";
                    span.textContent = option;
                    label.appendChild(input);
                    label.appendChild(span);
                    div.appendChild(label);
                    div.appendChild(document.createElement("br"));
                });

                quizContainer.appendChild(div);
            });
        }

        function submitQuiz() {
            const questions = document.querySelectorAll("#quiz-questions .question-box");
            let score = 0;

            questions.forEach((div, index) => {
                const selected = div.querySelector(`input[name='q${index}']:checked`);
                if (selected && selected.value === correctAnswers[index]) {
                    score++;
                }
            });

            const scoreMsg = document.getElementById("score-message");
            scoreMsg.textContent = `Your Score: ${score}/${questions.length}`;
            scoreMsg.style.display = "block";
        }
    </script>
</body>
</html>
