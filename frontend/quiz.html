<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Test your knowledge with career and mentorship quizzes on the Career Counseling Platform.">
    <title>Quizzes - Career Counseling</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/quiz.css">
</head>
<body>
    <header>
        <h1>Career Counseling</h1>
        <nav>
            <ul>
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a id="mentorshipLink" href="mentorship-student.html">Mentorship</a></li>
                <li><a href="jobs.html">Jobs</a></li>
                <li><a href="quiz.html">Quizzes</a></li>
                <li><a href="youtube.html">Videos</a></li>
                <li><a href="chat.html">Chat</a></li>
                <li><a href="#" onclick="logout(); return false;">Logout</a></li>
            </ul>
        </nav>
        <button id="hamburger" aria-label="Toggle navigation" aria-expanded="false">
            <span></span><span></span><span></span>
        </button>
    </header>

    <div class="page-wrapper">
        <h1 class="section-title">Career Quizzes</h1>
        <p class="section-sub">Test your knowledge and track your progress.</p>

        <section class="quiz-section">
            <h2>Available Quizzes</h2>
            <div class="form-group">
                <label for="quiz-category">Select Quiz Type</label>
                <select id="quiz-category">
                    <option value="mentorship">Mentorship &amp; Leadership</option>
                    <option value="career">Career &amp; Science</option>
                </select>
            </div>
            <button class="btn" onclick="loadQuiz()">Start Quiz</button>
        </section>

        <section id="quiz-container" style="display:none;">
            <h3 id="quiz-title">Quiz</h3>
            <div id="quiz-questions"></div>
            <button class="btn" onclick="submitQuiz()">Submit Quiz</button>
            <p id="score-message" style="display:none;" aria-live="polite"></p>
        </section>
    </div>

    <footer>
        <p>&copy; 2025 Career Counseling. All rights reserved.</p>
    </footer>

    <script src="js/logout.js"></script>
    <script src="js/nav.js" defer></script>
    <script>
        const API_BASE = "https://career-counseling-backend.onrender.com";
        const correctAnswers = {};

        async function loadQuiz() {
            const category = document.getElementById("quiz-category").value;
            const container = document.getElementById("quiz-container");
            container.style.display = "block";
            document.getElementById("quiz-questions").innerHTML = '<div class="spinner"></div>';
            document.getElementById("score-message").style.display = "none";

            const apiUrl = category === "mentorship"
                ? "https://opentdb.com/api.php?amount=5&category=9&type=multiple"
                : "https://opentdb.com/api.php?amount=5&category=17&type=multiple";

            try {
                const response = await fetch(apiUrl);
                const data = await response.json();
                displayQuestions(data.results);
            } catch {
                document.getElementById("quiz-questions").innerHTML = '<p>Failed to load questions. Please try again.</p>';
            }
        }

        function decodeHtml(html) {
            return new DOMParser().parseFromString(html, "text/html").body.textContent;
        }

        function displayQuestions(questions) {
            const quizContainer = document.getElementById("quiz-questions");
            quizContainer.innerHTML = "";
            Object.keys(correctAnswers).forEach(k => delete correctAnswers[k]);

            questions.forEach((q, index) => {
                correctAnswers[index] = decodeHtml(q.correct_answer);

                const div = document.createElement("div");
                div.classList.add("question-box");

                const questionText = document.createElement("p");
                questionText.className = "question-text";
                questionText.textContent = `${index + 1}. ${decodeHtml(q.question)}`;
                div.appendChild(questionText);

                const options = [...q.incorrect_answers.map(decodeHtml), decodeHtml(q.correct_answer)]
                    .sort(() => Math.random() - 0.5);

                options.forEach(option => {
                    const label = document.createElement("label");
                    label.className = "option-label";
                    const input = document.createElement("input");
                    input.type = "radio";
                    input.name = `q${index}`;
                    input.value = option;
                    const span = document.createElement("span");
                    span.className = "option-text";
                    span.textContent = option;
                    label.appendChild(input);
                    label.appendChild(span);
                    div.appendChild(label);
                });

                quizContainer.appendChild(div);
            });
        }

        async function submitQuiz() {
            const questions = document.querySelectorAll("#quiz-questions .question-box");
            let score = 0;

            questions.forEach((div, index) => {
                const selected = div.querySelector(`input[name='q${index}']:checked`);
                if (selected && selected.value === correctAnswers[index]) score++;
            });

            const scoreMsg = document.getElementById("score-message");
            scoreMsg.textContent = `Your Score: ${score} / ${questions.length}`;
            scoreMsg.style.display = "block";

            const token = localStorage.getItem("token");
            const category = document.getElementById("quiz-category").value;
            if (token) {
                try {
                    await fetch(`${API_BASE}/api/quiz/save-score`, {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            "Authorization": `Bearer ${token}`
                        },
                        body: JSON.stringify({ category, score, total: questions.length })
                    });
                } catch { /* score save is best-effort */ }
            }
        }
    </script>
</body>
</html>
