<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Discover the best YouTube tutorials for your career and skills on Career Counseling Platform.">
    <title>YouTube Recommendations - Career Counseling</title>
    <link rel="preconnect" href="https://career-counseling-backend.onrender.com">
    <link rel="preconnect" href="https://www.youtube.com">
    <link rel="stylesheet" href="css/youtube.css">
</head>
<body>
    <header>
        <h1>Best YouTube Videos for Your Career &amp; Skills</h1>
        <nav>
            <ul>
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a id="mentorshipLink" href="mentorship-student.html">Mentorship</a></li>
                <li><a href="jobs.html">Jobs</a></li>
                <li><a href="#" onclick="logout()">Logout</a></li>
            </ul>
        </nav>
    </header>

    <section class="search-section">
        <h2>Find the Best Videos</h2>
        <label for="career-field">Select Career Field:</label>
        <select id="career-field">
            <option value="software development">Software Development</option>
            <option value="data science">Data Science</option>
            <option value="marketing">Marketing</option>
            <option value="design">Design</option>
        </select>

        <label for="skill">Select Skill:</label>
        <input type="text" id="skill" placeholder="Enter a skill (e.g., Python, SEO)" aria-label="Skill">
        <button onclick="fetchVideos()">Search Videos</button>
    </section>

    <section id="video-list" class="video-list">
        <h2>Recommended Videos</h2>
        <div id="videos" aria-live="polite"></div>
    </section>

    <footer>
        <p>&copy; 2025 Career Counseling. All rights reserved.</p>
    </footer>

    <script src="js/logout.js"></script>
    <script src="js/nav.js"></script>
    <script src="js/youtube.js" defer></script>
</body>
</html>
