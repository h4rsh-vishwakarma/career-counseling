<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Real-time mentor-student chat on Career Counseling Platform.">
    <title>Chat - Career Counseling</title>
    <link rel="preconnect" href="https://cdn.socket.io">
    <link rel="preconnect" href="https://career-counseling-backend.onrender.com">
    <link rel="stylesheet" href="css/chat.css">
</head>
<body>
    <header>
        <h1>Mentor-Student Chat</h1>
        <nav>
            <ul>
                <li><a href="dashboard.html">Home</a></li>
                <li><a id="mentorshipLink" href="mentorship-student.html">Mentorship</a></li>
                <li><a href="service.html">Services</a></li>
                <li><a href="jobs.html">Jobs</a></li>
                <li><a href="quiz.html">Quizzes</a></li>
                <li><a href="#" onclick="logout()">Logout</a></li>
            </ul>
        </nav>
    </header>

    <div class="chat-container">
        <div class="chat-header">
            <h2>Mentor-Student Chat</h2>
            <span id="onlineStatus" class="status offline">Offline</span>
        </div>
        <div id="chatContainer" class="chat-box" role="log" aria-live="polite"></div>
        <div id="typingIndicator" class="typing-indicator" style="display:none;" aria-live="polite">User is typing...</div>
        <div class="chat-input">
            <label for="messageInput" class="sr-only">Message</label>
            <input type="text" id="messageInput" placeholder="Type a message..." aria-label="Message input">
            <button id="sendButton" aria-label="Send message">Send</button>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="js/logout.js"></script>
    <script src="js/nav.js"></script>
    <script src="js/chat.js" defer></script>

    <footer>
        <p>&copy; 2025 Career Counseling. All rights reserved.</p>
    </footer>
</body>
</html>
