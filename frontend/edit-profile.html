<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Edit your profile details on Career Counseling Platform.">
    <title>Edit Profile - Career Counseling</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/login_reg.css">
</head>
<body>
    <header>
        <h1>Career Counseling</h1>
        <nav>
            <ul>
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="#" onclick="logout(); return false;">Logout</a></li>
            </ul>
        </nav>
        <button id="hamburger" aria-label="Toggle navigation" aria-expanded="false">
            <span></span><span></span><span></span>
        </button>
    </header>

    <div class="form-container">
        <div class="form-box">
            <h2>Edit Profile</h2>
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" placeholder="Enter your name" aria-label="Full name">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Enter your email" aria-label="Email">
            </div>
            <div class="form-group">
                <label for="skills">Skills</label>
                <input type="text" id="skills" placeholder="e.g. Python, Design, Marketing" aria-label="Skills">
            </div>
            <div class="form-group">
                <label for="education">Education</label>
                <input type="text" id="education" placeholder="e.g. B.Tech Computer Science" aria-label="Education">
            </div>
            <button class="btn btn-block" onclick="saveProfile()">Save Changes</button>
            <p style="margin-top:1rem;"><a href="dashboard.html">← Back to Dashboard</a></p>
        </div>
    </div>

    <footer>
        <p>&copy; 2025 Career Counseling. All rights reserved.</p>
    </footer>

    <script src="js/logout.js"></script>
    <script src="js/nav.js" defer></script>
    <script>
        const API_BASE = "https://career-counseling-backend.onrender.com";

        document.addEventListener("DOMContentLoaded", async () => {
            const token = localStorage.getItem("token");
            if (!token) { window.location.href = "login.html"; return; }
            try {
                const response = await fetch(`${API_BASE}/api/user/profile`, {
                    headers: { Authorization: `Bearer ${token}` }
                });
                if (!response.ok) throw new Error();
                const user = await response.json();
                document.getElementById("name").value = user.name || "";
                document.getElementById("email").value = user.email || "";
                document.getElementById("skills").value = user.skills || "";
                document.getElementById("education").value = user.education || "";
            } catch {
                console.error("Failed to load profile");
            }
        });

        async function saveProfile() {
            const profileData = {
                name: document.getElementById("name").value,
                email: document.getElementById("email").value,
                skills: document.getElementById("skills").value,
                education: document.getElementById("education").value,
            };
            try {
                const response = await fetch(`${API_BASE}/api/user/profile`, {
                    method: "PUT",
                    headers: {
                        "Content-Type": "application/json",
                        Authorization: `Bearer ${localStorage.getItem("token")}`,
                    },
                    body: JSON.stringify(profileData),
                });
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.message || "Error updating profile.");
                }
                alert("Profile updated successfully!");
                window.location.href = "dashboard.html";
            } catch (error) {
                alert("Error: " + error.message);
            }
        }
    </script>
</body>
</html>
