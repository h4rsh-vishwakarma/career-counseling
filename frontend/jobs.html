<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Explore job opportunities tailored to your qualification and stream on Career Counseling Platform.">
    <meta property="og:title" content="Jobs - Career Counseling">
    <meta property="og:description" content="Find jobs matched to your qualification and field on Career Counseling Platform.">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary">
    <title>Jobs - Career Counseling</title>
    <link rel="stylesheet" href="css/jobs.css">
    <script src="js/jobs.js" defer></script>
</head>
<body>
    <header>
        <h1>Job Opportunities</h1>
        <nav>
            <ul>
                <li><a href="dashboard.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a id="mentorshipLink" href="mentorship-student.html">Mentorship</a></li>
                <li><a href="service.html">Services</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="#" onclick="logout()">Logout</a></li>
            </ul>
        </nav>
    </header>

    <section class="job-search">
        <h2>Find Your Dream Job</h2>
        <label for="qualification">Select Your Qualification:</label>
        <select id="qualification">
            <option value="10th">10th Pass</option>
            <option value="12th">12th Pass</option>
            <option value="undergraduate">Undergraduate</option>
            <option value="postgraduate">Postgraduate</option>
        </select>

        <label for="stream">Select Your Stream:</label>
        <select id="stream">
            <option value="science">Science</option>
            <option value="commerce">Commerce</option>
            <option value="arts">Arts</option>
            <option value="engineering">Engineering</option>
            <option value="medical">Medical</option>
        </select>
        <br><br>
        <button class="button" onclick="fetchJobs()"><span>Search Jobs</span></button>
    </section>

    <section id="job-listings">
        <h2>Job Results</h2>
        <p>Select your qualification and stream, then click Search Jobs to see relevant listings.</p>
        <p id="loadingMessage" style="display:none; color: blue;" aria-live="polite">Loading jobs...</p>
        <div id="jobsContainer" aria-live="polite"></div>
    </section>

    <footer>
        <p>&copy; 2025 Career Counseling. All rights reserved.</p>
    </footer>

    <script src="js/logout.js"></script>
    <script src="js/nav.js"></script>
</body>
</html>
